<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>

<body>
    <nav class="navbar navbar-custom navbar-dark">
        <div class="d-flex align-items-center w-100 justify-content-between">
            <button class="btn btn-link text-white d-md-none" id="sidebarToggle">
                <i class="bi bi-list fs-4"></i>
            </button>

            <h5 class="mb-0 text-white d-none d-md-block">
                <a href="dashboard.html">
                    <img src="../images/transparentlogo.png" style="width: 180px;" alt="Island Tracker">
                </a>
            </h5>

            <div class="sidebar-menu">
                <a href="index.html" id="logout" style="margin: 20px">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Salir de sesión</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="card mx-auto" style="width: 60rem; top: 1rem; padding: 20px; margin-bottom: 30px;">
        <div class="d-flex justify-content-between align-items-start flex-wrap">
            <div>
                <h3 class="mb-1">Dashboard</h3>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-4 mb-3">
                <a href="rutas.html" class="text-decoration-none">
                    <div class="card border-primary h-100">
                        <div class="card-body">
                            <h5 class="card-title">Rutas</h5>
                            <p class="card-text">Revisa, crea y edita rutas.</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-4 mb-3">
                <a href="users.html" class="text-decoration-none">
                    <div class="card border-success h-100">
                        <div class="card-body">
                            <h5 class="card-title">Usuarios</h5>
                            <p class="card-text">Gestiona cuentas y permisos.</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-4 mb-3">
                <a href="inventario.html" class="text-decoration-none">
                    <div class="card border-warning h-100">
                        <div class="card-body">
                            <h5 class="card-title">Inventario</h5>
                            <p class="card-text">Controla stock y actualiza insumos.</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        document.getElementById('logout').addEventListener('click', function (e) {
            localStorage.setItem('token', '');
        });

    </script>
</body>

</html>
