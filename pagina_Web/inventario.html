<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="../images/favicon.ico" type="image/x-icon" />


    <!-- Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <!-- JQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>


    <!-- Tabulator CSS -->
    <link href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css" rel="stylesheet">

    <!-- Tabulator JS -->
    <script src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>
</head>

<body>
    <!-- Barra de navegacion -->
    <nav class="navbar navbar-custom navbar-dark">
        <div class="d-flex align-items-center w-100 justify-content-between">
            <button class="btn btn-link text-white d-md-none" id="sidebarToggle">
                <i class="bi bi-list fs-4"></i>
            </button>

            <h5 class="mb-0 text-white d-none d-md-block">
                <a href="dashboard.html">
                    <img src="../images/transparentlogo.png" style="width: 180px;">
                </a>
            </h5>

            <div class="sidebar-menu">
                <a href="index.html" id="logout" style="margin: 20px">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Salir de sesión</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="card mx-auto" style="width: 80rem; top: 1rem; padding: 20px">
        <h3 id="title">Inventario</h3>
        <div id="myTable"></div>
        <div id="loadingLabel">Loading...</div>
        <button class="btn btn-sm btn-primary create-btn" id="botonCrear" style="width: 5rem">Crear</button>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="crudModal">
        <h3 id="modalTitle">Modificar inventario</h3>
        <form id="userForm">
            <input type="hidden" id="crudInventarioId">


            <div class="row">
                <div class="col-6">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" id="nombre" placeholder="Nombre" required>
                    </div>
                </div>

                <div class="col-6">
                    <div class="mb-3">
                        <label class="form-label">Precio</label>
                        <input type="text" id="precio" placeholder="Precio" required>
                    </div>


                </div>
            </div>

            <div class="row">
                <div class="col-6">
                    <div class="mb-3">
                        <label class="form-label">Cantidad</label>
                        <input type="text" id="cantidad" placeholder="Cantidad" required>
                    </div>
                </div>

                <div class="col-6">
                    <div class="mb-3">
                        <label class="form-label">Contacto</label>
                        <input type="text" id="contacto" placeholder="Contacto" required>
                    </div>
                </div>
            </div>


            <div class="row">
                <div class="col-6">
                    <div class="mb-3">
                        <label class="form-label">Telefono</label>
                        <input type="text" id="telefono" placeholder="Telefono" required>
                    </div>
                </div>

                <div class="col-6">
                    <div class="mb-3">
                        <label class="form-label">ID Ruta</label>
                        <input type="text" id="idRuta" placeholder="ID Ruta" required>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Imagen</label>
                <input type="text" id="imagen" placeholder="Imagen" required>
            </div>

            <div class="modal-footer">
                <button type="submit" id="crudConfirmarBtn" class="btn">Save</button>
                <button type="button" id="crudCancelarBtn" class="btn">Cancel</button>
            </div>
        </form>
    </div>

    <div id="deleteModal">
        <h3 id="modalTitle">Borrar este elemento?</h3>
        <form id="userForm">
            <input type="hidden" id="deleteInventarioId">

            <div class="modal-footer">
                <button type="button" id="deleteConfirmarBtn" class="btn">Confirmar</button>
                <button type="button" id="deleteCancelarBtn" class="btn">Cancelar</button>
            </div>

            <b id="keyError">Este elemento esta siendo usado en otra parte del sistema</b>
        </form>
    </div>


    <!-- Bootstrap-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>



    <div id="modal-backdrop"></div>

    <script>
        var table;
        var state;
        var cerror;
        const token = localStorage.getItem('token');

        function googleMap(cell, formatterParams, onRendered) {
            // cell: the cell component
            const ubicacion = cell.getValue();

            if (!ubicacion || !ubicacion.coordinates) {
                return "";
            }

            const coords = ubicacion.coordinates;
            const lat = coords[1];
            const lon = coords[0];

            var url = `https://www.google.com/maps?q=${lat},${lon}`;
            var label = "Ubicacion";
            return "<a href='" + url + "' target='_blank'>" + label + "</a>";
        }


        $(document).ready(function () {
            table = new Tabulator("#myTable", {
                ajaxURL: "/api/inventario",
                ajaxConfig: {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                },
                pagination: "local",
                paginationSize: 10,
                layout: "fitData",
                initialSort: [
                    { column: "id_inventario", dir: "asc" },
                ],
                columns: [
                    { title: "ID", field: "id_inventario", width: 70 },
                    { title: "Nombre", field: "nombre", sorter: "string" },
                    { title: "Dirección", field: "direccion", sorter: "string" },
                    {
                        title: "Ubicacion", field: "ubicacion", formatter: googleMap,
                    },
                    { title: "Precio", field: "precio", sorter: "string" },
                    { title: "Cantidad", field: "cantidad", sorter: "string" },
                    { title: "Telefono", field: "telefono", sorter: "string" },
                    { title: "Contacto", field: "contacto", sorter: "string" },
                    { title: "ID Ruta", field: "id_ruta", sorter: "string" },
                    { title: "Imagen", field: "imagen", sorter: "string" },
                    {
                        title: "Acciones",
                        field: "actions",
                        width: 150,
                        formatter: function () {
                            return '<button class="btn btn-sm btn-primary edit-btn">Edit</button>' +
                                '<button class="btn btn-sm btn-primary delete-btn">Delete</button>';
                        },
                        cellClick: function (e, cell) {
                            var rowData = cell.getRow().getData();
                            if (e.target.classList.contains("edit-btn")) {
                                state = 'editar';
                                openCrudModal(rowData);
                            } else if (e.target.classList.contains("delete-btn")) {
                                openDeleteModal(rowData);
                            }
                        }
                    }
                ]
            });


            table.on("dataLoaded", function () {
                $("#loadingLabel").hide();
            });

        });

        function openCrudModal(rowData) {
            $('#crudInventarioId').val(state == 'editar' ? rowData.id_inventario : '');
            $('#nombre').val(state == 'editar' ? rowData.nombre : '');
            $('#precio').val(state == 'editar' ? rowData.precio : '');
            $('#cantidad').val(state == 'editar' ? rowData.cantidad : '');
            $('#contacto').val(state == 'editar' ? rowData.contacto : '');
            $('#telefono').val(state == 'editar' ? rowData.telefono : '');
            $('#idRuta').val(state == 'editar' ? rowData.id_ruta : '');
            $('#imagen').val(state == 'editar' ? rowData.imagen : '');
            $('#modal-backdrop').show();
            $('#crudModal').show();
        }

        function closeCrudModal() {
            $('#crudInventarioId, #nombre, #precio, #cantidad, #contacto, #telefono, #idRuta, #imagen').val('');
            $('#modal-backdrop').hide();
            $('#crudModal').hide();
        }

        $('#botonCrear').on('click', function () {
            state = 'crear';
            openCrudModal('');
        });

        $('#deleteModal').on('click', '#deleteConfirmarBtn', function () {

            const id = $('#deleteInventarioId').val();

            $.ajax({
                url: '/api/inventario/' + id,
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                },
                success: function () {
                    table.replaceData();
                    $('#modal-backdrop').hide();
                    $('#deleteModal').hide();
                    $('#keyError').hide();

                },
                error: function (xhr, status, error) {
                    if (error == 'Conflict') {
                        $('#keyError').show();
                        cerror = 'Conflict';
                        return;
                    }
                    alert('Delete failed: ' + error);
                }
            });
            if (cerror != 'Conflict') {
                $('#modal-backdrop').hide();
                $('#deleteModal').hide();
                $('#keyError').hide();
            }
        });

        function openDeleteModal(rowData) {
            $('#deleteInventarioId').val(rowData.id_inventario);
            $('#modal-backdrop').show();
            $('#deleteModal').show();
        }

        $('#deleteModal').on('click', '#deleteCancelarBtn', function () {
            $('#crudInventarioId').val('');
            $('#modal-backdrop').hide();
            $('#deleteModal').hide();
            $('#keyError').hide();
        });

        $('#crudModal').on('click', '#crudCancelarBtn', function () {
            $('#crudInventarioId, #nombre, #precio, #cantidad, #contacto, #telefono, #idRuta, #imagen').val('');
            $('#modal-backdrop').hide();
            $('#crudModal').hide();
        });

        $('#crudModal').on('click', '#crudConfirmarBtn', function (e) {
            e.preventDefault();

            const data = {
                id_inventario: $('#crudInventarioId').val(),
                nombre: $('#nombre').val(),
                precio: $('#precio').val(),
                cantidad: $('#cantidad').val(),
                contacto: $('#contacto').val(),
                telefono: $('#telefono').val(),
                id_ruta: $('#idRuta').val(),
                imagen: $('#imagen').val()
            };
            const id = data.id_inventario;

            if (state == 'editar') {
                $.ajax({
                    url: '/api/inventario/' + id,
                    method: 'PUT',
                    contentType: 'application/json',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    },
                    data: JSON.stringify(data),
                    success: function () {
                        table.replaceData();
                        $('#crudInventarioId, #nombre, #precio, #cantidad, #contacto, #telefono, #idRuta, #imagen').val('');
                        $('#modal-backdrop, #crudModal').hide();
                    },
                    error: function (xhr, status, error) {
                        alert('Save failed: ' + error);
                    }
                });
            } else if (state == 'crear') {
                const createData = {
                    nombre: $('#nombre').val(),
                    precio: $('#precio').val(),
                    cantidad: $('#cantidad').val(),
                    contacto: $('#contacto').val(),
                    telefono: $('#telefono').val(),
                    id_ruta: $('#idRuta').val(),
                    imagen: $('#imagen').val()
                };
                $.ajax({
                    url: '/api/inventario/',
                    method: 'POST',
                    contentType: 'application/json',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    },
                    data: JSON.stringify(createData),
                    success: function () {
                        table.replaceData();
                        $('#crudInventarioId, #nombre, #precio, #cantidad, #contacto, #telefono, #idRuta, #imagen').val('');
                        $('#modal-backdrop, #crudModal').hide();
                    },
                    error: function (xhr, status, error) {
                        alert('Save failed: ' + error);
                    }
                });
            }
        });
    </script>

    <script>
        document.getElementById('logout').addEventListener('click', function (e) {
            localStorage.setItem('token', '');
        });

    </script>

</body>

</html>
