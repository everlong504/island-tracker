<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <link rel="icon" href="../images/favicon.ico" type="image/x-icon" />

</head>

<body>
    <nav class="navbar navbar-custom navbar-dark">
        <div class="d-flex align-items-center w-100 justify-content-between">
            <button class="btn btn-link text-white d-md-none" id="sidebarToggle">
                <i class="bi bi-list fs-4"></i>
            </button>

            <h5 class="mb-0 text-white d-none d-md-block">
                <a href="dashboard.html">
                    <img src="../images/transparentlogo.png" style="width: 180px;" alt="Island Tracker">
                </a>
            </h5>

            <div class="sidebar-menu">
                <a href="index.html" id="logout" style="">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Salir de sesión</span>
                </a>

                <a href="perfil.html" id="perfil" style="margin: 20px">
                    <i class="bi bi-person"></i>
                    <span>Perfil</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="card mx-auto" style="width: 60rem; top: 1rem; padding: 20px; margin-bottom: 30px;">
        <div class="d-flex justify-content-between align-items-start flex-wrap">
            <div>
                <h3 class="mb-1">Mi Perfil</h3>
                <p class="text-muted">Información personal de la cuenta</p>
            </div>
        </div>

        <div class="row mt-4" id="profile-info">
            <!-- Spinner de carga -->
            <div id="spinner" class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>

            <!-- Contenido estático del perfil (oculto inicialmente) -->
            <div id="profile-content" class="d-none w-100">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="card border-0 bg-light">
                            <div class="card-body">
                                <h6 class="card-subtitle mb-2 text-muted">Nombre completo</h6>
                                <p class="card-text fs-5" id="user-nombre">—</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="card border-0 bg-light">
                            <div class="card-body">
                                <h6 class="card-subtitle mb-2 text-muted">Correo electrónico</h6>
                                <p class="card-text fs-5" id="user-email">—</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="card border-0 bg-light">
                            <div class="card-body">
                                <h6 class="card-subtitle mb-2 text-muted">Permisos</h6>
                                <p class="card-text fs-5" id="user-permisos">—</p>
                                <p class="text-muted" id="permisos-subtitulo"></p>

                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="card border-0 bg-light">
                            <div class="card-body">
                                <h6 class="card-subtitle mb-2 text-muted">Estado</h6>
                                <p class="card-text fs-5" id="user-estado">—</p>
                            </div>
                        </div>

                        <div class="card border-0 bg-light">
                            <div class="card-body">
                                <h6 class="card-subtitle mb-2 text-muted">Último acceso</h6>
                                <p class="card-text fs-5" id="user-last-login">—</p>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <p class="text-muted" id="sugerencia">Si desea cambiar sus datos, contacte un administrador</p>

        <div class="d-flex justify-content-end">
            <a href="dashboard.html" class="btn btn-outline-secondary me-2">
                <i class="bi bi-arrow-left"></i> Volver al Dashboard
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        $(document).ready(function () {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'index.html';
            }

            function loadUserProfile() {
                $.ajax({
                    url: '/api/me',
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    },
                    success: function (user) {
                        displayUserInfo(user);
                    },
                    error: function (xhr, status, error) {
                        console.error('Error al cargar perfil:', error);
                        $('#spinner').html(`
                            <div class="alert alert-danger" role="alert">
                                Error al cargar los datos del perfil. Por favor, intenta de nuevo.
                            </div>
                        `);
                    }
                });
            }

            function displayUserInfo(user) {
                $('#spinner').addClass('d-none');
                $('#profile-content').removeClass('d-none');

                $('#user-nombre').text(user.nombre || 'No especificado');
                $('#user-email').text(user.email || 'No especificado');
                if (user.permisos == 'Admin') {
                    $('#user-permisos').text('Admin');
                    $('#permisos-subtitulo').text('Tiene todos los permisos, incluyendo cambiar cada tabla, modificar usuarios y utilizar la aplicacion movil');
                    $('#sugerencia').text('Si desea cambiar sus datos, entre a la tabla de usuarios.');

                } else if (user.permisos == 'Gerente') {
                    $('#user-permisos').text('Gerente');
                    $('#permisos-subtitulo').text('Tiene todo permiso para editar todas las tablas, excepto usuarios.');
                } else if (user.permisos == 'Conductor') {
                    $('#user-permisos').text('Conductor');
                    $('#permisos-subtitulo').text('Tiene todo permiso para observar, pero no modificar, el inventario y las rutas.');
                }

                const activeStatus = user.is_active ?
                    '<span class="badge bg-success">Activo</span>' :
                    '<span class="badge bg-secondary">Inactivo</span>';
                $('#user-estado').html(activeStatus);

                if (user.last_login) {
                    const date = new Date(user.last_login);
                    const formattedDate = date.toLocaleDateString('es-ES', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    $('#user-last-login').text(formattedDate);
                    $('#last-login-container').show();
                } else {
                    $('#last-login-container').hide();
                }
            }

            loadUserProfile();

            $('#logout').on('click', function (e) {
                e.preventDefault();
                localStorage.removeItem('token');
                window.location.href = 'index.html';
            });
        });
    </script>
</body>

</html>
