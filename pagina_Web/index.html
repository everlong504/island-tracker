<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <!-- JQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>


    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css" />
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
</head>

<body>
    <!-- Barra de navegacion -->

    <nav class="navbar navbar-custom navbar-dark">
        <div class="d-flex align-items-center w-100 justify-content-between">
            <button class="btn btn-link text-white d-md-none" id="sidebarToggle">
                <i class="bi bi-list fs-4"></i>
            </button>

            <h5 class="mb-0 text-white d-none d-md-block">
                <img src="../images/transparentlogo.png" style="width: 180px;">
            </h5>

            <div class="sidebar-menu">
                <a href="login.html">
                    <i class="bi bi-people"></i>
                    <span>Salir de sesion</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="card mx-auto" style="width: 70rem; top: 1rem;">
        <table id="myTable"></table>
        <div id="loadingLabel">Loading...</div>
    </div>



    <!-- Bootstrap-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>



    <script>

        // Source - https://stackoverflow.com/a/60757085
        // Posted by shrys, modified by community. See post 'Timeline' for change history
        // Retrieved 2026-03-03, License - CC BY-SA 4.0

        const getNewCases = async () => {
            const response = await fetch('/api/ruta');
            const data = await response.json();
            console.log('fetched data:', data);
            $('#loadingLabel').hide();
            $('#myTable').DataTable({
                data: data,
                bLengthChange: false,
                columns: [
                    { data: 'direccion', title: 'Direccion' },
                    { data: 'vendedor', title: 'Vendedor' }
                ]
            });
        };

        getNewCases();
    </script>
</body>

</html>
