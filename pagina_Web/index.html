<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #63B3DFff 0%, #AADAF1ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }

        .login-header {
            background: linear-gradient(135deg, #63B3DFff 0%, #AADAF1ff 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .login-body {
            padding: 40px;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-login {
            background: linear-gradient(135deg, #63B3DFff 0%, #AADAF1ff 100%);
            width: 100%;
            border: none;
            padding: 12px;
            font-weight: 600;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>

    <link rel="icon" href="../images/favicon.ico" type="image/x-icon" />

</head>

<body>
    <div class="row">
        <div class="col-12 mx-auto">
            <div class="login-card">
                <div class="login-header">


                    <i class="bi bi-droplet-half fs-1"></i>
                    <h3 class="mb-0 mt-2">Iniciar Sesión</h3>
                    <p class="mb-0 small">Island Tracker</p>
                </div>
                <div class="login-body">

                    <form method="POST" action="" id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-envelope me-1"></i> Email
                            </label>
                            <input type="email" class="form-control" name="email" required
                                placeholder="correo@ejemplo.com" id="email">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                <i class="bi bi-key me-1"></i> Contraseña
                            </label>
                            <input type="password" class="form-control" name="password" required
                                placeholder="Ingrese su contraseña" id="password">
                        </div>

                        <button type="submit" class="btn btn-primary btn-login w-100">
                            <i class="bi bi-box-arrow-in-right me-2"></i>
                            Ingresar
                        </button>
                    </form>

                    <div id="errorMessage" class="text-danger mt-2"></div>

                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password_hash = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = '';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password_hash })
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }
                localStorage.setItem('token', data.token);
                window.location.href = '/dashboard.html';
            } catch (error) {
                errorDiv.textContent = error.message;
            }
        });
    </script>

</body>

</html>
